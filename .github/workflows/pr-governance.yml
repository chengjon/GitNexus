name: PR Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-body-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Ensure PR base ref is available for governance diff
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
      - name: Validate PR body governance sections
        run: node gitnexus/scripts/ci/repository-governance-check.mjs --mode pr-body --repo-root . --base-ref "origin/${{ github.base_ref }}" --event-path "$GITHUB_EVENT_PATH"
